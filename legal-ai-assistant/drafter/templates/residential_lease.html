<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Residential Lease Agreement</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 40px; line-height: 1.6; }
        h1 { text-align: center; font-size: 18pt; margin-bottom: 30px; }
        .clause { margin-bottom: 20px; }
        .clause-title { font-weight: bold; font-size: 14pt; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>RESIDENTIAL LEASE AGREEMENT</h1>
    
    {% for clause in clauses %}
    <div class="clause">
        <div class="clause-title">{{ clause.title }}</div>
        <div>{{ clause.text|safe }}</div>
    </div>
    {% endfor %}
</body>
</html>
